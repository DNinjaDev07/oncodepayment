name: CI/CD

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run tests
        run: mvn -B clean test

  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            danieloncode/oncodepayment-backend:${{ github.sha }}
            danieloncode/oncodepayment-backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            danieloncode/oncodepayment-frontend:${{ github.sha }}
            danieloncode/oncodepayment-frontend:latest

      - name: Update Helm image tags
        shell: bash
        run: |
          set -euo pipefail
          sed -i -E "s|repository: .*oncodepayment-backend|repository: danieloncode/oncodepayment-backend|" helm/oncodepayment/values.yaml
          sed -i -E "s|repository: .*oncodepayment-frontend|repository: danieloncode/oncodepayment-frontend|" helm/oncodepayment/values.yaml
          sed -i -E "/backend:/,/pullPolicy:/ s/tag: .*/tag: ${GITHUB_SHA}/" helm/oncodepayment/values.yaml
          sed -i -E "/frontend:/,/pullPolicy:/ s/tag: .*/tag: ${GITHUB_SHA}/" helm/oncodepayment/values.yaml

      - name: Commit and push Helm tag update
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add helm/oncodepayment/values.yaml

          if git diff --staged --quiet; then
            echo "No Helm tag changes to commit."
            exit 0
          fi

          git commit -m "ci: update Helm image tags to ${GITHUB_SHA} [skip ci]"
          git push origin HEAD:master
