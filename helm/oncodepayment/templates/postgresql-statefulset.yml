apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: "{{ .Release.Name }}-postgres"
  labels:
    name: "{{ .Release.Name }}-postgres"
spec:
  serviceName: "{{ .Release.Name }}-postgres-service"
  replicas: 1
  selector:
    matchLabels:
      name: "{{ .Release.Name }}-postgres"
  template:
    metadata:
      labels:
        name: "{{ .Release.Name }}-postgres"
    spec:
      containers:
        - name: postgres
          image: "{{ .Values.postgresql.image }}"
          securityContext:
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: {{ .Values.postgresql.port }}
          env:
            - name: POSTGRES_DB
              value: "{{ .Values.postgresql.database }}"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.existingSecret | quote }}
                  key: DB_USERNAME
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.existingSecret | quote }}
                  key: DB_PASSWORD
          resources:
            {{- toYaml .Values.postgresql.resources | nindent 12 }}
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: {{ .Values.postgresql.storageClass | quote }}
        resources:
          requests:
            storage: {{ .Values.postgresql.storage | quote }}
