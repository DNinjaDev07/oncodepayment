apiVersion: v1
kind: Service
metadata:
  name: "{{ .Release.Name }}-frontend-service"
  labels:
    name: "{{ .Release.Name }}-frontend-service"
spec:
  type: ClusterIP
  selector:
    name: "{{ .Release.Name }}-frontend"
  ports:
    - port: {{ .Values.frontend.port }}
      targetPort: {{ .Values.frontend.port }}
