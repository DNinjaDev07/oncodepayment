apiVersion: v1
kind: Service
metadata:
  name: "{{ .Release.Name }}-backend-service"
  labels:
    name: "{{ .Release.Name }}-backend-service"
spec:
  selector:
    name: "{{ .Release.Name }}-backend"
  ports:
    - port: {{ .Values.backend.port }}
      targetPort: {{ .Values.backend.port }}
  type: ClusterIP
