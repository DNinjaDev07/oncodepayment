apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{ .Release.Name }}-postgres"
  labels:
    name: "{{ .Release.Name }}-postgres"
spec:
  replicas: 1
  selector:
    matchLabels:
      name: "{{ .Release.Name }}-postgres"
  template:
    metadata:
      labels:
        name: "{{ .Release.Name }}-postgres"
    spec:
      containers:
        - name: postgres
          image: "{{ .Values.postgresql.image }}"
          ports:
            - containerPort: {{ .Values.postgresql.port }}
          env:
            - name: POSTGRES_DB
              value: "{{ .Values.postgresql.database }}"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: "{{ .Release.Name }}-secret"
                  key: DB_USERNAME
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: "{{ .Release.Name }}-secret"
                  key: DB_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: "{{ .Release.Name }}-postgres-pvc"
