backend:
    image:
        repository: danieloncode/oncodepayment-backend
        tag: f1df18dae5ae48bb77b4fe1fca9950d7b8e4fbe8
        pullPolicy: IfNotPresent
    replicas: 1
    port: 8098
    env:
        dbUsername: oncode
        dbDriver: org.postgresql.Driver
        jpaDialect: org.hibernate.dialect.PostgreSQLDialect
        jpaDdlAuto: update

frontend:
    image:
        repository: danieloncode/oncodepayment-frontend
        tag: f1df18dae5ae48bb77b4fe1fca9950d7b8e4fbe8
        pullPolicy: IfNotPresent
    replicas: 1
    port: 80

postgresql:
    image: postgres:16-alpine
    port: 5432
    database: paymentdb
    existingSecret: oncodepayment-secret
    storage: 1Gi

ingress:
    enabled: true
    className: nginx
    host: oncodepayment.local
