backend:
    image:
        repository: danieloncode/oncodepayment-backend
        tag: 869bd12f306d2d0a7a47e4c99735f136fdea4a31
        pullPolicy: IfNotPresent
    replicas: 1
    port: 8098
    env:
        dbUsername: oncode
        dbDriver: org.postgresql.Driver
        jpaDialect: org.hibernate.dialect.PostgreSQLDialect
        jpaDdlAuto: update

frontend:
    image:
        repository: danieloncode/oncodepayment-frontend
        tag: 869bd12f306d2d0a7a47e4c99735f136fdea4a31
        pullPolicy: IfNotPresent
    replicas: 1
    port: 80

postgresql:
    image: postgres:16-alpine
    port: 5432
    database: paymentdb
    existingSecret: oncodepayment-secret
    awsSecretName: oncodepayment-dev/postgres
    storage: 1Gi

ingress:
    enabled: true
    className: nginx
    host: oncodepayment.local
