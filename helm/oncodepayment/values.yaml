backend:
    image:
        repository: danieloncode/oncodepayment-backend
        tag: 69b19062ad1c9abcb201cbcf9608cca4b6c05577
        pullPolicy: IfNotPresent
    replicas: 1
    port: 8098
    env:
        dbUsername: oncode
        dbDriver: org.postgresql.Driver
        jpaDialect: org.hibernate.dialect.PostgreSQLDialect
        jpaDdlAuto: update
    resources:
        requests:
            cpu: 250m
            memory: 512Mi
        limits:
            cpu: 500m
            memory: 768Mi

frontend:
    image:
        repository: danieloncode/oncodepayment-frontend
        tag: 69b19062ad1c9abcb201cbcf9608cca4b6c05577
        pullPolicy: IfNotPresent
    replicas: 1
    port: 80
    containerPort: 8080
    resources:
        requests:
            cpu: 50m
            memory: 64Mi
        limits:
            cpu: 100m
            memory: 128Mi

postgresql:
    image: postgres:16-alpine
    port: 5432
    database: paymentdb
    existingSecret: oncodepayment-secret
    awsSecretName: oncodepayment-dev/postgres
    storage: 1Gi
    storageClass: standard
    resources:
        requests:
            cpu: 100m
            memory: 256Mi
        limits:
            cpu: 500m
            memory: 512Mi

ingress:
    enabled: true
    className: nginx
    host: oncodepayment.local
