backend:
    image:
        repository: danieloncode/oncodepayment-backend
        tag: 5f4ed5d63b432a32c7f5e01909ca70500bce0a83
        pullPolicy: IfNotPresent
    replicas: 1
    port: 8098
    env:
        dbUsername: oncode
        dbDriver: org.postgresql.Driver
        jpaDialect: org.hibernate.dialect.PostgreSQLDialect
        jpaDdlAuto: update

frontend:
    image:
        repository: danieloncode/oncodepayment-frontend
        tag: 5f4ed5d63b432a32c7f5e01909ca70500bce0a83
        pullPolicy: IfNotPresent
    replicas: 1
    port: 80

postgresql:
    image: postgres:16-alpine
    port: 5432
    database: paymentdb
    existingSecret: oncodepayment-secret
    awsSecretName: oncodepayment-dev/postgres
    storage: 1Gi
    storageClass: standard

ingress:
    enabled: true
    className: nginx
    host: oncodepayment.local
